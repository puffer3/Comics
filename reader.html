<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Reader — Henry Glover</title>
<link rel="stylesheet" href="styles.css" />
<style>
  .reader{max-width:1400px;margin:0 auto;padding:48px 16px 36px;text-align:center}
  .stage{position:relative;display:flex;align-items:center;justify-content:center;cursor:pointer}
  /* fit each image to the viewport: wide images get wide, tall images shrink to
     fit on screen so the bottom is never cut off */
  .stage img{width:auto;height:auto;max-width:100%;max-height:calc(100vh - 190px)}
  .spread{display:flex;justify-content:center;align-items:center;gap:0;width:100%}
  .spread.two img,.spread.cover img{max-width:50%}   /* spread pages, and the solo cover, are one page wide */

  /* side controls */
  /* arrow stays put; label floats above it (absolute) so it never shifts the arrow */
  .flip{position:fixed;top:50%;transform:translateY(-50%);background:none;border:0;cursor:pointer;
        color:#727884;z-index:40;padding:10px;line-height:0}
  .flip:hover{color:#474c57}
  .flip.prev{left:40px}    /* pinned, with breathing room from the browser edge */
  .flip.next{right:40px}
  .flip svg{display:block}
  .flip .label{position:absolute;bottom:100%;right:0;margin-bottom:10px;
        white-space:nowrap;font-size:11px;letter-spacing:.18em;text-transform:uppercase;
        color:#727884;line-height:1.4;text-align:right}
  .flip[hidden]{display:none}

  /* caption under the image (viewer only) */
  .caption{max-width:680px;margin:18px auto 0;text-align:center;line-height:1.6}
  .caption .cap-title{display:block;font-size:15px;letter-spacing:.05em;text-transform:uppercase;color:var(--text)}
  .caption .cap-desc{display:block;font-size:14px;color:#5b606b;margin-top:5px}

  /* hint at the top (first thing read); page counter under the page */
  .hint{margin:0 0 16px;text-align:center;color:#3f444e;font-size:13px;letter-spacing:.16em;
        text-transform:uppercase;transition:opacity .5s ease}
  .counter{margin:14px 0 0;text-align:center;color:#4d4d48;font-size:13px;letter-spacing:.18em}

  .missing{color:var(--muted);padding:60px 0;text-align:center}

  /* mobile tap-to-turn guide overlay (shown briefly, fades away) */
  .tapguide{position:absolute;inset:0;display:none;z-index:30;pointer-events:none;
            transition:opacity .5s ease}
  .tapguide .tz{position:absolute;top:0;bottom:0;display:flex;align-items:center;justify-content:center;
            color:#fff;font-size:12px;letter-spacing:.14em;text-transform:uppercase;text-align:center;padding:0 10px}
  .tapguide .tz span{max-width:7em;line-height:1.6}
  .tapguide .tz-back{left:0;width:33.333%;background:rgba(20,19,15,.6)}
  .tapguide .tz-fwd{right:0;width:66.667%;background:rgba(20,19,15,.42)}

  @media (max-width:680px){
    .flip{display:none}            /* no arrows on mobile - tap the image instead */
    .hint{display:none}            /* the overlay teaches mobile navigation */
    .stage img{width:auto;height:auto;max-width:100%;max-height:calc(100vh - 150px)}
    .tapguide.show{display:block}
  }
</style>
</head>
<body>

<header>
  <div class="wrap nav">
    <a href="index.html" class="brand">Henry Glover</a>
    <button class="menu-btn" aria-label="Menu" onclick="document.getElementById('navlinks').classList.toggle('open')">☰</button>
    <nav class="nav-links" id="navlinks">
      <a href="index.html">Comics</a>
      <a href="drawings.html">Illustrations</a>
      <a href="about.html">About</a>
    </nav>
  </div>
</header>

<main>
  <div class="reader">
    <p class="hint" id="hint">Use your arrow keys to turn the page</p>
    <div class="stage">
      <div class="spread" id="spread"></div>
      <div class="tapguide" id="tapguide" aria-hidden="true">
        <div class="tz tz-back"><span>Tap to go back</span></div>
        <div class="tz tz-fwd"><span>Tap to turn the page</span></div>
      </div>
    </div>
    <div class="caption" id="caption" style="display:none"></div>
    <p class="counter" id="counter"></p>
  </div>

  <button class="flip prev" id="prev" hidden aria-label="Previous page">
    <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><path d="M15 5l-7 7 7 7"/></svg>
  </button>

  <button class="flip next" id="next" aria-label="Next page">
    <span class="label" id="nextLabel">Next page</span>
    <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><path d="M9 5l7 7-7 7"/></svg>
  </button>

  <p class="missing" id="missing" hidden>Comic not found. <a href="index.html">Back to Comics</a>.</p>
</main>

<script src="content.js"></script>
<script src="nav.js"></script>
<script>
(function () {
  var params = new URLSearchParams(location.search);
  var section = params.get('s') || 'comics';
  var slug = params.get('c') || '';
  var groupBase = params.get('g') || '';            // for project groups (a/b/c)
  var startIndex = parseInt(params.get('i'), 10);   // start index for sequences

  var list = (window.BOOKS && window.BOOKS[section]) || [];
  var book = list.filter(function (b) { return b.slug === slug; })[0];

  var sectionPage = {
    comics: 'index.html', drawings: 'drawings.html',
    characters: 'characters.html', storyboards: 'storyboards.html'
  }[section] || 'index.html';
  var sectionLabel = {
    comics: 'Comics', drawings: 'Illustrations',
    characters: 'Character Designs', storyboards: 'Storyboards'
  }[section] || 'Comics';

  // bold the nav item for the section being viewed (reader.html matches no nav link itself)
  var activeLink = document.querySelector('#navlinks a[href="' + sectionPage + '"]');
  if (activeLink) activeLink.classList.add('active');

  var pageImg = document.getElementById('page');
  var prevBtn = document.getElementById('prev');
  var nextBtn = document.getElementById('next');
  var nextLbl = document.getElementById('nextLabel');
  var counter = document.getElementById('counter');
  var caption = document.getElementById('caption');
  var hint    = document.getElementById('hint');
  function esc(s){return String(s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
  var stage   = document.querySelector('.stage');
  var guide   = document.getElementById('tapguide');
  function hideHint() { if (hint) hint.style.opacity = '0'; }
  function hideGuide() { if (guide) guide.style.opacity = '0'; }
  setTimeout(hideHint, 6000);   // fade on its own if the reader just sits there

  // show the tap guide briefly on touch / small screens
  var isMobile = window.matchMedia('(max-width:680px)').matches;
  if (isMobile && guide) {
    guide.classList.add('show');
    setTimeout(hideGuide, 3500);
  }

  // a comic/book (?c=slug) plays its pages; a loose-image sequence (?i=index)
  // plays that section's single images starting at the clicked one
  var pages = null, title = '';
  var isBook = !!(book && book.pages && book.pages.length);
  if (isBook) {
    pages = book.pages; title = book.title;
  } else if (groupBase) {
    var grp = ((window.GROUPS && window.GROUPS[section]) || [])
                .filter(function (x) { return x.base === groupBase; })[0];
    if (grp && grp.images && grp.images.length) { pages = grp.images; title = sectionLabel; }
  } else if (!isNaN(startIndex)) {
    var singles = (window.GALLERY && window.GALLERY[section]) || [];
    if (singles.length) { pages = singles; title = sectionLabel; }
  }

  if (!pages) {
    document.querySelector('.reader').style.display = 'none';
    prevBtn.hidden = true; nextBtn.hidden = true;
    document.getElementById('missing').hidden = false;
    return;
  }

  // desktop comics: first page single, then double-page spreads.
  // illustrations / projects, and ALL of mobile, stay single-image.
  var spread = document.getElementById('spread');
  var isSpread = isBook && window.matchMedia('(min-width:900px)').matches;  // spreads only on tablet/desktop
  var views = [];
  if (isSpread) {
    views.push({ imgs: [pages[0]], start: 0 });                 // page 1 alone
    for (var k = 1; k < pages.length; k += 2)
      views.push({ imgs: pages.slice(k, k + 2), start: k });    // 2-up spreads
  } else {
    for (var k2 = 0; k2 < pages.length; k2++)
      views.push({ imgs: [pages[k2]], start: k2 });
  }

  var last = views.length - 1;
  var i = isNaN(startIndex) ? 0 : Math.max(0, Math.min(last, startIndex));

  function atEnd() { return i >= last; }

  function render() {
    var v = views[i];
    spread.className = 'spread' + (v.imgs.length > 1 ? ' two' : (isSpread ? ' cover' : ''));
    spread.innerHTML = v.imgs.map(function (it) {
      return '<img src="' + encodeURI(it.full || it) + '" alt="' + esc(title) + '">';
    }).join('');

    // page counter only for multi-page comics (books)
    counter.style.display = isBook ? '' : 'none';
    if (isBook) {
      var s = v.start, e = s + v.imgs.length - 1;
      counter.textContent = (s === e ? (s + 1) : (s + 1) + '-' + (e + 1)) + ' / ' + pages.length;
    }

    // caption from the first image of the view
    var first = v.imgs[0];
    var ct = first.title || '', cd = first.desc || '';
    caption.innerHTML = (ct ? '<span class="cap-title">' + esc(ct) + '</span>' : '') +
                        (cd ? '<span class="cap-desc">' + esc(cd) + '</span>' : '');
    caption.style.display = (ct || cd) ? '' : 'none';

    prevBtn.hidden = (i === 0);                 // back arrow only after page 1
    nextBtn.hidden = false;                     // last arrow returns to the section grid

    if (atEnd()) {
      if (isBook) { nextLbl.textContent = 'Back to ' + sectionLabel; nextLbl.style.display = ''; }
      else { nextLbl.style.display = 'none'; }
    } else if (i === 0) {
      nextLbl.textContent = 'Next page';
      nextLbl.style.display = '';
    } else {
      nextLbl.style.display = 'none';
    }
  }

  function go(n) {
    hideHint();   // they've figured out navigation
    i = Math.max(0, Math.min(last, n));
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function forward() {
    if (atEnd()) { location.href = sectionPage; }   // last image -> back to the section grid
    else { go(i + 1); }
  }

  prevBtn.addEventListener('click', function () { go(i - 1); });
  nextBtn.addEventListener('click', forward);

  // distinguish a clean tap from a pan/pinch so zooming & panning don't flip the page
  var tStart = null, tMoved = false;
  stage.addEventListener('touchstart', function (e) {
    if (e.touches.length > 1) { tMoved = true; return; }   // pinch
    tStart = { x: e.touches[0].clientX, y: e.touches[0].clientY }; tMoved = false;
  }, { passive: true });
  stage.addEventListener('touchmove', function (e) {
    if (!tStart) return;
    var t = e.touches[0];
    if (Math.abs(t.clientX - tStart.x) > 10 || Math.abs(t.clientY - tStart.y) > 10) tMoved = true;
  }, { passive: true });

  // tap the image: left 1/3 = back, right 2/3 = forward (back to section on last page)
  stage.addEventListener('click', function (e) {
    if (tMoved) { tMoved = false; return; }   // was a pan/pinch, not a tap
    hideHint(); hideGuide();
    var r = stage.getBoundingClientRect();
    if ((e.clientX - r.left) < r.width / 3) { go(i - 1); }
    else { forward(); }
  });
  document.addEventListener('keydown', function (e) {
    if (e.key === 'ArrowRight' && !atEnd()) go(i + 1);
    else if (e.key === 'ArrowLeft') go(i - 1);
  });

  render();
})();
</script>
</body>
</html>
