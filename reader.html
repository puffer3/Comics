<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Reader — Henry Glover</title>
<link rel="stylesheet" href="styles.css" />
<style>
  .reader{max-width:1000px;margin:0 auto;padding:48px 16px 36px;text-align:center}
  .stage{position:relative;display:flex;align-items:center;justify-content:center;cursor:pointer}
  .stage img{max-width:100%;max-height:80vh;object-fit:contain}

  /* side controls */
  /* arrow stays put; label floats above it (absolute) so it never shifts the arrow */
  .flip{position:fixed;top:50%;transform:translateY(-50%);background:none;border:0;cursor:pointer;
        color:#c4c4bf;z-index:40;padding:10px;line-height:0}
  .flip:hover{color:#9a9a93}
  .flip.prev{left:max(12px,calc(50vw - 560px))}
  .flip.next{right:max(12px,calc(50vw - 560px))}
  .flip svg{display:block}
  .flip .label{position:absolute;bottom:100%;left:50%;transform:translateX(-50%);margin-bottom:10px;
        white-space:nowrap;font-size:11px;letter-spacing:.18em;text-transform:uppercase;
        color:#c4c4bf;line-height:1.4}
  .flip[hidden]{display:none}

  /* hint at the top (first thing read); page counter under the page */
  .hint{margin:0 0 16px;text-align:center;color:#6b6b66;font-size:11px;letter-spacing:.16em;
        text-transform:uppercase;transition:opacity .5s ease}
  .counter{margin:14px 0 0;text-align:center;color:#4d4d48;font-size:13px;letter-spacing:.18em}

  .missing{color:var(--muted);padding:60px 0;text-align:center}

  /* mobile tap-to-turn guide overlay (shown briefly, fades away) */
  .tapguide{position:absolute;inset:0;display:none;z-index:30;pointer-events:none;
            transition:opacity .5s ease}
  .tapguide .tz{position:absolute;top:0;bottom:0;display:flex;align-items:center;justify-content:center;
            color:#fff;font-size:12px;letter-spacing:.14em;text-transform:uppercase;text-align:center;padding:0 10px}
  .tapguide .tz span{max-width:7em;line-height:1.6}
  .tapguide .tz-back{left:0;width:33.333%;background:rgba(20,19,15,.6)}
  .tapguide .tz-fwd{right:0;width:66.667%;background:rgba(20,19,15,.42)}

  @media (max-width:680px){
    .flip{display:none}            /* no arrows on mobile - tap the image instead */
    .hint{display:none}            /* the overlay teaches mobile navigation */
    .stage img{max-height:78vh}
    .tapguide.show{display:block}
  }
</style>
</head>
<body>

<header>
  <div class="wrap nav">
    <a href="index.html" class="brand">Henry Glover</a>
    <button class="menu-btn" aria-label="Menu" onclick="document.getElementById('navlinks').classList.toggle('open')">☰</button>
    <nav class="nav-links" id="navlinks">
      <a href="index.html">Comics</a>
      <a href="drawings.html">Illustrations</a>
      <a href="characters.html">Characters</a>
      <a href="storyboards.html">Storyboards</a>
      <a href="about.html">About</a>
    </nav>
  </div>
</header>

<main>
  <div class="reader">
    <p class="hint" id="hint">Use your arrow keys to turn the page</p>
    <div class="stage">
      <img id="page" alt="" />
      <div class="tapguide" id="tapguide" aria-hidden="true">
        <div class="tz tz-back"><span>Tap to go back</span></div>
        <div class="tz tz-fwd"><span>Tap to turn the page</span></div>
      </div>
    </div>
    <p class="counter" id="counter"></p>
  </div>

  <button class="flip prev" id="prev" hidden aria-label="Previous page">
    <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><path d="M15 5l-7 7 7 7"/></svg>
  </button>

  <button class="flip next" id="next" aria-label="Next page">
    <span class="label" id="nextLabel">Next page</span>
    <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><path d="M9 5l7 7-7 7"/></svg>
  </button>

  <p class="missing" id="missing" hidden>Comic not found. <a href="index.html">Back to Comics</a>.</p>
</main>

<script src="content.js"></script>
<script src="nav.js"></script>
<script>
(function () {
  var params = new URLSearchParams(location.search);
  var section = params.get('s') || 'comics';
  var slug = params.get('c') || '';

  var list = (window.BOOKS && window.BOOKS[section]) || [];
  var book = list.filter(function (b) { return b.slug === slug; })[0];

  var sectionPage = {
    comics: 'index.html', drawings: 'drawings.html',
    characters: 'characters.html', storyboards: 'storyboards.html'
  }[section] || 'index.html';
  var sectionLabel = {
    comics: 'Comics', drawings: 'Illustrations',
    characters: 'Character Designs', storyboards: 'Storyboards'
  }[section] || 'Comics';

  // bold the nav item for the section being viewed (reader.html matches no nav link itself)
  var activeLink = document.querySelector('#navlinks a[href="' + sectionPage + '"]');
  if (activeLink) activeLink.classList.add('active');

  var pageImg = document.getElementById('page');
  var prevBtn = document.getElementById('prev');
  var nextBtn = document.getElementById('next');
  var nextLbl = document.getElementById('nextLabel');
  var counter = document.getElementById('counter');
  var hint    = document.getElementById('hint');
  var stage   = document.querySelector('.stage');
  var guide   = document.getElementById('tapguide');
  function hideHint() { if (hint) hint.style.opacity = '0'; }
  function hideGuide() { if (guide) guide.style.opacity = '0'; }
  setTimeout(hideHint, 6000);   // fade on its own if the reader just sits there

  // show the tap guide briefly on touch / small screens
  var isMobile = window.matchMedia('(max-width:680px)').matches;
  if (isMobile && guide) {
    guide.classList.add('show');
    setTimeout(hideGuide, 3500);
  }

  if (!book || !book.pages || !book.pages.length) {
    document.querySelector('.reader').style.display = 'none';
    prevBtn.hidden = true; nextBtn.hidden = true;
    document.getElementById('missing').hidden = false;
    return;
  }

  var pages = book.pages;
  var last = pages.length - 1;
  var i = 0;

  function atEnd() { return i >= last; }

  function render() {
    pageImg.src = encodeURI(pages[i].full || pages[i]);
    pageImg.alt = book.title + ' - page ' + (i + 1);
    counter.textContent = (i + 1) + ' / ' + pages.length;

    prevBtn.hidden = (i === 0);        // back arrow only after page 1

    if (atEnd()) {
      nextLbl.textContent = 'Back to ' + sectionLabel;
      nextLbl.style.display = '';
    } else if (i === 0) {
      nextLbl.textContent = 'Next page';
      nextLbl.style.display = '';
    } else {
      nextLbl.style.display = 'none';
    }
  }

  function go(n) {
    hideHint();   // they've figured out navigation
    i = Math.max(0, Math.min(last, n));
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function forward() { if (atEnd()) { location.href = sectionPage; } else { go(i + 1); } }

  prevBtn.addEventListener('click', function () { go(i - 1); });
  nextBtn.addEventListener('click', forward);

  // tap the image: left 1/3 = back, right 2/3 = forward (back to section on last page)
  stage.addEventListener('click', function (e) {
    hideHint(); hideGuide();
    var r = stage.getBoundingClientRect();
    if ((e.clientX - r.left) < r.width / 3) { go(i - 1); }
    else { forward(); }
  });
  document.addEventListener('keydown', function (e) {
    if (e.key === 'ArrowRight' && !atEnd()) go(i + 1);
    else if (e.key === 'ArrowLeft') go(i - 1);
  });

  render();
})();
</script>
</body>
</html>
