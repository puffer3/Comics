name: Build gallery manifest

# Regenerates content.js whenever you add/remove images and push.
on:
  push:
    branches: [ main ]
    paths:
      - 'content/**'
      - 'generate.py'
      - '.github/workflows/build-gallery.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Pillow
        run: pip install pillow

      - name: Generate manifest + thumbnails
        run: python3 generate.py --force

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content.js content
          if ! git diff --cached --quiet; then
            git commit -m "Auto-update gallery manifest + thumbnails"
            git push
          else
            echo "No changes"
          fi
