<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Viewer — Henry Glover</title>
<link rel="stylesheet" href="styles.css" />
<style>
  /* flex column fills the space under the sticky 65px header so the image auto-fits
     between the hint and the caption - always on screen, no scrolling, at any size. */
  .reader{max-width:1500px;margin:0 auto;height:calc(100vh - 65px);box-sizing:border-box;
          display:flex;flex-direction:column;padding:8px 16px;text-align:center}
  .stage{flex:1;min-height:0;position:relative;display:flex;align-items:center;justify-content:center;cursor:pointer}
  .stage img{width:auto;height:auto;max-width:100%;max-height:100%;transition:transform .2s ease;-webkit-user-drag:none;user-select:none}
  @media (min-width:861px){            /* desktop: side arrows navigate, so click the image to zoom */
    .stage{cursor:zoom-in}
    .stage.zoomed{cursor:grab;z-index:30}          /* zoomed in: drag to move around */
    .stage.zoomed.grabbing{cursor:grabbing}
  }

  /* side arrows pinned to the edges, light grey */
  .flip{position:fixed;top:50%;transform:translateY(-50%);background:none;border:0;cursor:pointer;
        color:#727884;z-index:40;padding:10px;line-height:0}
  .flip:hover{color:#474c57}
  .flip.prev{left:40px}
  .flip.next{right:40px}
  .flip svg{display:block}
  .flip[hidden]{display:none}

  /* arrow-key tip at the top */
  .hint{margin:0 0 16px;text-align:center;color:#3f444e;font-size:13px;letter-spacing:.16em;
        text-transform:uppercase;transition:opacity .5s ease}

  /* caption under the image */
  .caption{max-width:680px;margin:18px auto 0;text-align:center;line-height:1.6}
  .caption .cap-title{display:block;font-size:15px;letter-spacing:.05em;text-transform:uppercase;color:var(--text)}
  .caption .cap-desc{display:block;font-size:14px;color:#5b606b;margin-top:5px}

  /* thumbnail filmstrip for project groups (click to swap the main image) */
  .strip{display:flex;justify-content:center;flex-wrap:wrap;gap:10px;margin:20px auto 0;max-width:680px}
  .strip a{display:block;width:84px;border-radius:var(--radius);overflow:hidden;opacity:1;
           outline:2px solid transparent;transition:outline-color .15s ease}
  .strip a.active{outline-color:var(--muted)}
  .strip img{width:100%;aspect-ratio:1/1;object-fit:cover;display:block}
  .strip[hidden]{display:none}

  /* project group: hero centered on the page, the other images stacked beside it.
     3-column grid (1fr | hero | 1fr) keeps the hero horizontally centered no matter
     its width, so swapping portrait/landscape images won't shift it sideways. */
  .group-row{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:18px;max-width:100%;flex:1;min-height:0;width:100%}
  .group-row .stage{grid-column:2;width:70vw;max-width:1000px;height:100%}  /* fills the flex column; image centers inside, so swapping dimensions never shifts the thumb column */
  .group-row .stage img{max-height:100%;max-width:100%}
  .strip.column{grid-column:3;justify-self:start;flex-direction:column;flex-wrap:nowrap;gap:12px;margin:0;max-width:200px}
  .strip.column a{width:100px}
  .strip.column img{aspect-ratio:1/1;object-fit:cover;transform:scale(2.1)}  /* square thumbs, zoomed into the center (tile clips the overflow) */

  .missing{color:var(--muted);padding:60px 0;text-align:center}

  /* mobile tap-to-turn guide overlay */
  .tapguide{position:absolute;inset:0;display:none;z-index:30;pointer-events:none;transition:opacity .5s ease}
  .tapguide .tz{position:absolute;top:0;bottom:0;display:flex;align-items:center;justify-content:center;
            color:#fff;font-size:12px;letter-spacing:.14em;text-transform:uppercase;text-align:center;padding:0 10px}
  .tapguide .tz span{max-width:7em;line-height:1.6}
  .tapguide .tz-back{left:0;width:33.333%;background:rgba(20,19,15,.6)}
  .tapguide .tz-fwd{right:0;width:66.667%;background:rgba(20,19,15,.42)}

  .mbar{display:none}

  @media (max-width:860px){
    .flip{display:none}              /* side arrows replaced by the bottom bar on mobile */
    .hint{display:none}
    /* drop the top brand bar in the reader on phones; the nav stays (it's fixed to the bottom) */
    header{border-bottom:0;background:none}
    .brand{display:none}
    .nav{height:auto}
    /* phones: fill the viewport (header is hidden) and center the image vertically
       in the frame above the fixed arrow bar + bottom nav */
    .reader{height:100vh;display:flex;flex-direction:column;justify-content:center;padding:8px 0 120px}
    .stage{flex:0 0 auto}
    .stage img{max-width:100%;max-height:calc(100vh - 150px)}
    .strip a{width:64px}
    /* on phones the group stacks: hero on top, others in a row below - centered */
    .group-row{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:0 0 auto}
    .group-row .stage{width:auto;height:auto;flex:0 0 auto}
    .group-row .stage img{max-width:100%;max-height:calc(100vh - 340px)}
    .strip.column{flex-direction:row;flex-wrap:wrap;max-width:none}
    .strip.column a{width:88px}
    /* skinny back / forward bars, sitting just above the fixed bottom nav */
    .mbar{display:flex;gap:10px;position:fixed;left:0;right:0;
          bottom:calc(46px + env(safe-area-inset-bottom));z-index:50;
          padding:8px 12px;background:rgba(255,255,255,.92);
          -webkit-backdrop-filter:saturate(180%) blur(8px);backdrop-filter:saturate(180%) blur(8px);
          border-top:1px solid var(--line)}
    .mbar button{flex:1;height:40px;display:flex;align-items:center;justify-content:center;
          background:var(--bg-soft);border:1px solid var(--line);border-radius:8px;color:#5b606b;cursor:pointer}
    .mbar button svg{width:24px;height:24px;display:block}
    .mbar button[disabled]{opacity:.3}
  }
</style>
</head>
<body>

<header>
  <div class="wrap nav">
    <a href="index.html" class="brand">Henry Glover</a>
    <button class="menu-btn" aria-label="Menu" onclick="document.getElementById('navlinks').classList.toggle('open')">☰</button>
    <nav class="nav-links" id="navlinks">
      <a href="index.html">Comics</a>
      <a href="drawings.html">Illustrations</a>
      <a href="about.html">About</a>
    </nav>
  </div>
</header>

<main>
  <div class="reader">
    <p class="hint" id="hint">Use your arrow keys to look through</p>
    <div class="stage">
      <img id="page" alt="" />
      <div class="tapguide" id="tapguide" aria-hidden="true">
        <div class="tz tz-back"><span>Tap to go back</span></div>
        <div class="tz tz-fwd"><span>Tap for next</span></div>
      </div>
    </div>
    <div class="caption" id="caption" style="display:none"></div>
    <div class="strip" id="strip" hidden></div>
  </div>

  <button class="flip prev" id="prev" hidden aria-label="Previous">
    <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><path d="M15 5l-7 7 7 7"/></svg>
  </button>
  <button class="flip next" id="next" aria-label="Next">
    <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><path d="M9 5l7 7-7 7"/></svg>
  </button>

  <!-- mobile: skinny back/forward bars above the bottom nav (desktop uses the side arrows) -->
  <div class="mbar" id="mbar">
    <button id="mprev" aria-label="Previous">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M15 5l-7 7 7 7"/></svg>
    </button>
    <button id="mnext" aria-label="Next">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M9 5l7 7-7 7"/></svg>
    </button>
  </div>

  <p class="missing" id="missing" hidden>Not found. <a href="drawings.html">Back to Illustrations</a>.</p>
</main>

<script src="content.js"></script>
<script src="nav.js"></script>
<script>
(function () {
  var params = new URLSearchParams(location.search);
  var section = params.get('s') || 'drawings';
  var groupBase = params.get('g') || '';
  var startIndex = parseInt(params.get('i'), 10);

  var sectionPage = {
    comics: 'index.html', drawings: 'drawings.html',
    characters: 'characters.html', storyboards: 'storyboards.html'
  }[section] || 'drawings.html';
  var sectionLabel = {
    comics: 'Comics', drawings: 'Illustrations',
    characters: 'Character Designs', storyboards: 'Storyboards'
  }[section] || 'Illustrations';

  var activeLink = document.querySelector('#navlinks a[href="' + sectionPage + '"]');
  if (activeLink) activeLink.classList.add('active');

  var pageImg = document.getElementById('page');
  var prevBtn = document.getElementById('prev');
  var nextBtn = document.getElementById('next');
  var mPrev   = document.getElementById('mprev');   // mobile skinny back/forward bars
  var mNext   = document.getElementById('mnext');
  var caption = document.getElementById('caption');
  var hint    = document.getElementById('hint');
  var stage   = document.querySelector('.stage');
  var guide   = document.getElementById('tapguide');
  var strip   = document.getElementById('strip');
  function esc(s){return String(s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
  function hideHint(){ if (hint) hint.style.opacity = '0'; }
  function hideGuide(){ if (guide) guide.style.opacity = '0'; }
  setTimeout(hideHint, 6000);
  var isMobile = window.matchMedia('(max-width:860px)').matches;
  if (isMobile && guide) { guide.classList.add('show'); setTimeout(hideGuide, 3500); }

  // a project group (?g=base) plays its images; a loose sequence (?i=index)
  // plays the section's single images
  var pages = null, isGroup = false;
  if (groupBase) {
    var grp = ((window.GROUPS && window.GROUPS[section]) || [])
                .filter(function (x) { return x.base === groupBase; })[0];
    if (grp && grp.images && grp.images.length) { pages = grp.images; isGroup = true; }
  } else if (!isNaN(startIndex)) {
    var singles = (window.GALLERY && window.GALLERY[section]) || [];
    if (singles.length) { pages = singles; }
  }

  if (!pages) {
    document.querySelector('.reader').style.display = 'none';
    prevBtn.hidden = true; nextBtn.hidden = true;
    document.getElementById('missing').hidden = false;
    return;
  }

  var last = pages.length - 1;
  var i = isNaN(startIndex) ? 0 : Math.max(0, Math.min(last, startIndex));

  function go(n) { hideHint(); hideGuide(); i = Math.max(0, Math.min(last, n)); render(); window.scrollTo({ top: 0, behavior: 'smooth' }); }
  function atEnd() { return i >= last; }

  // cross-item browsing: gallery order is projects (groups) first, then the loose
  // singles (matching the grid). Forward off the end of one item opens the next
  // item; back off the front opens the previous item's last image. Only the very
  // last item returns to the grid, and the very first item has no back arrow.
  var allGroups  = (window.GROUPS  && window.GROUPS[section])  || [];
  var allSingles = (window.GALLERY && window.GALLERY[section]) || [];
  var curGi = isGroup ? allGroups.map(function (g) { return g.base; }).indexOf(groupBase) : -1;
  function groupHref(idx, atLast) {
    var g = allGroups[idx];
    return 'illreader.html?s=' + encodeURIComponent(section) + '&g=' + encodeURIComponent(g.base) +
           (atLast ? '&i=' + (g.images.length - 1) : '');
  }
  function nextItemHref() {
    if (isGroup) {
      if (curGi < allGroups.length - 1) return groupHref(curGi + 1, false);
      if (allSingles.length) return 'illreader.html?s=' + encodeURIComponent(section) + '&i=0';
    }
    return sectionPage;                       // singles are last -> end at the grid
  }
  function prevItemHref() {
    if (isGroup) { return curGi > 0 ? groupHref(curGi - 1, true) : null; }
    return allGroups.length ? groupHref(allGroups.length - 1, true) : null;  // first single -> last project
  }
  function forward() { if (atEnd()) { location.href = nextItemHref(); } else { go(i + 1); } }
  function backward() { if (i > 0) { go(i - 1); } else { var h = prevItemHref(); if (h) location.href = h; } }

  // project group: hero shown large on the left, the other images stacked in a
  // column beside it. Click a column image to swap it into the large slot.
  if (isGroup) {
    strip.hidden = false;
    strip.classList.add('column');
    var row = document.createElement('div');
    row.className = 'group-row';
    stage.parentNode.insertBefore(row, stage);
    row.appendChild(stage);
    row.appendChild(strip);
    strip.innerHTML = pages.map(function (it, idx) {
      return '<a data-idx="' + idx + '" href="#"><img src="' + encodeURI(it.thumb || it.full) + '" alt=""></a>';
    }).join('');
    strip.addEventListener('click', function (e) {
      var a = e.target.closest('a[data-idx]');
      if (!a) return;
      e.preventDefault();
      go(parseInt(a.getAttribute('data-idx'), 10));
    });
  }

  // desktop: click the image to zoom in toward the cursor, drag to pan, double-click
  // (or Escape) to zoom out. single click while zoomed does nothing, so a pan never
  // exits by accident. mobile keeps tap-to-turn; the side arrows navigate.
  var desktopMQ = window.matchMedia('(min-width:861px)');
  var ZOOM = 2.2;
  var zoomed = false, panX = 0, panY = 0;
  var dragging = false, mMoved = false, mStart = null;
  function applyZoomTransform() {
    pageImg.style.transform = 'translate(' + panX + 'px,' + panY + 'px) scale(' + ZOOM + ')';
  }
  function resetZoom() {
    if (!zoomed) return;
    zoomed = false; panX = 0; panY = 0;
    stage.classList.remove('zoomed', 'grabbing');
    pageImg.style.transition = '';
    pageImg.style.transform = '';
  }
  function zoomInAt(e) {
    var r = pageImg.getBoundingClientRect();
    var ox = Math.max(0, Math.min(100, ((e.clientX - r.left) / r.width) * 100));
    var oy = Math.max(0, Math.min(100, ((e.clientY - r.top) / r.height) * 100));
    pageImg.style.transformOrigin = ox + '% ' + oy + '%';
    pageImg.style.transition = '';
    panX = 0; panY = 0; zoomed = true;
    stage.classList.add('zoomed');
    applyZoomTransform();
  }
  // drag to pan while zoomed
  stage.addEventListener('mousedown', function (e) {
    if (!zoomed || !desktopMQ.matches) return;
    dragging = true; mMoved = false;
    mStart = { x: e.clientX, y: e.clientY, px: panX, py: panY };
    pageImg.style.transition = 'none';   // follow the cursor without easing lag
    stage.classList.add('grabbing');
    e.preventDefault();
  });
  window.addEventListener('mousemove', function (e) {
    if (!dragging) return;
    var dx = e.clientX - mStart.x, dy = e.clientY - mStart.y;
    if (Math.abs(dx) > 3 || Math.abs(dy) > 3) mMoved = true;
    panX = mStart.px + dx; panY = mStart.py + dy;
    applyZoomTransform();
  });
  window.addEventListener('mouseup', function () {
    if (!dragging) return;
    dragging = false;
    stage.classList.remove('grabbing');
  });

  function render() {
    resetZoom();   // a new image always starts un-zoomed
    var it = pages[i];
    pageImg.src = encodeURI(it.full || it);
    pageImg.alt = sectionLabel + ' - ' + (i + 1);

    var ct = it.title || '', cd = it.desc || '';
    caption.innerHTML = (ct ? '<span class="cap-title">' + esc(ct) + '</span>' : '') +
                        (cd ? '<span class="cap-desc">' + esc(cd) + '</span>' : '');
    caption.style.display = (ct || cd) ? '' : 'none';

    prevBtn.hidden = (i === 0 && !prevItemHref());   // hide only at the very start of the gallery
    nextBtn.hidden = false;       // last item's last arrow returns to the section grid
    if (mPrev) mPrev.disabled = (i === 0 && !prevItemHref());   // mobile back disabled at the very start

    if (isGroup) {
      // keep every thumb in its own fixed slot; just highlight the current hero
      var links = strip.querySelectorAll('a[data-idx]');
      for (var k = 0; k < links.length; k++) {
        links[k].classList.toggle('active', k === i);
        links[k].style.display = 'block';
      }
    }
  }

  prevBtn.addEventListener('click', backward);
  nextBtn.addEventListener('click', forward);
  if (mPrev) mPrev.addEventListener('click', backward);
  if (mNext) mNext.addEventListener('click', forward);

  // mobile illustration: arrows navigate; TAP the image to zoom in toward the tap,
  // tap again to zoom out, drag to pan (pinch still works as a fallback). one-handed
  // friendly. (no tap-to-turn here - the comics reader keeps that.)
  var panStart = null, tStart = null, tMoved = false, tStartTime = 0;
  stage.addEventListener('touchstart', function (e) {
    if (e.touches.length > 1) { tMoved = true; return; }   // pinch: leave it to the browser
    var t = e.touches[0];
    tStart = { x: t.clientX, y: t.clientY }; tMoved = false; tStartTime = Date.now();
    if (desktopMQ.matches) return;
    if (zoomed) { panStart = { x: t.clientX, y: t.clientY, px: panX, py: panY }; pageImg.style.transition = 'none'; }
  }, { passive: true });
  stage.addEventListener('touchmove', function (e) {
    if (!tStart) return;
    var t = e.touches[0]; if (!t) return;
    if (Math.abs(t.clientX - tStart.x) > 10 || Math.abs(t.clientY - tStart.y) > 10) tMoved = true;
    if (!desktopMQ.matches && zoomed && panStart) {
      panX = panStart.px + (t.clientX - panStart.x);
      panY = panStart.py + (t.clientY - panStart.y);
      applyZoomTransform();
    }
  }, { passive: true });
  stage.addEventListener('touchend', function () {
    if (!desktopMQ.matches && tStart && !tMoved && (Date.now() - tStartTime) < 300) {
      hideHint(); hideGuide();
      if (zoomed) resetZoom(); else zoomInAt({ clientX: tStart.x, clientY: tStart.y });   // tap toggles zoom
    }
    panStart = null; tStart = null;
  }, { passive: true });
  stage.addEventListener('click', function (e) {
    if (mMoved) { mMoved = false; return; }   // finished a desktop pan-drag
    if (!desktopMQ.matches) return;            // mobile uses touch (long-press zoom; arrows navigate)
    hideHint(); hideGuide();
    if (!zoomed) zoomInAt(e);                  // desktop: click zooms in; out = double-click / Esc
  });
  stage.addEventListener('dblclick', function () {
    if (desktopMQ.matches && zoomed) resetZoom();   // double-click to zoom back out
  });
  document.addEventListener('keydown', function (e) {
    if (e.key === 'ArrowRight') forward();
    else if (e.key === 'ArrowLeft') backward();
    else if (e.key === 'Escape') resetZoom();       // Escape also zooms out
  });

  render();
})();
</script>
</body>
</html>
